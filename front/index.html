<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Concesionario Elite</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #111, #1e1e1e);
  color: white;
}

h1 {
  text-align: center;
  padding: 20px;
  font-size: 40px;
  letter-spacing: 2px;
  background: black;
  color: #ff2d2d;
  margin: 0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.6);
}

h2 {
  margin-top: 40px;
  border-left: 5px solid #ff2d2d;
  padding-left: 10px;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
  font-size: 14px;
}

button {
  padding: 12px 20px;
  background: #ff2d2d;
  border: none;
  border-radius: 6px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #cc0000;
  transform: scale(1.05);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.6);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.price {
  font-size: 20px;
  color: #00ff88;
  font-weight: bold;
}

.delete {
  background: #444;
  margin-top: 10px;
}

.delete:hover {
  background: #777;
}

</style>

</head>
<body>

<h1>🏍️ CONCESIONARIO ELITE</h1>

<div class="container">

<h2>Agregar Moto</h2>

<input id="nombre" placeholder="Nombre de la moto">
<input id="marca" placeholder="Marca">
<input id="precio" placeholder="Precio">
<input id="imagen" placeholder="URL de la imagen">

<button onclick="agregarMoto()">Agregar Moto</button>

<h2>Motos Disponibles</h2>

<div id="lista" class="grid"></div>

</div>

<script>

const API = "/api";

async function cargarMotos() {
  try {
    const res = await fetch(API + "/motos");
    const motos = await res.json();

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    if (motos.length === 0) {
      lista.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: #888;'>No hay motos disponibles</p>";
      return;
    }

    motos.forEach(m => {
      lista.innerHTML += `
        <div class="card">
          ${m.imagen ? `<img src="${m.imagen}" alt="${m.nombre}">` : "<div style='width:100%; height:200px; background:#333; display:flex; align-items:center; justify-content:center;'>Sin imagen</div>"}
          <div class="card-content">
            <h3>${m.nombre}</h3>
            <p><b>Marca:</b> ${m.marca}</p>
            <p class="price">$${m.precio.toLocaleString()}</p>
            <button class="delete" onclick="eliminarMoto(${m.id}, '${m.nombre}')">
              🗑️ Eliminar
            </button>
          </div>
        </div>
      `;
    });
  } catch (error) {
    console.error("Error al cargar motos:", error);
    alert("Error al conectar con la API");
  }
}

async function agregarMoto() {
  const nombre = document.getElementById("nombre").value.trim();
  const marca = document.getElementById("marca").value.trim();
  const precio = document.getElementById("precio").value.trim();
  const imagen = document.getElementById("imagen").value.trim();

  if (!nombre) {
    alert("⚠️ Por favor ingresa el nombre de la moto");
    return;
  }
  if (!marca) {
    alert("⚠️ Por favor ingresa la marca");
    return;
  }
  if (!precio || isNaN(precio) || precio <= 0) {
    alert("⚠️ Por favor ingresa un precio válido");
    return;
  }

  try {
    const res = await fetch(API + "/motos", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        nombre,
        marca,
        precio: parseInt(precio),
        imagen: imagen || null
      })
    });

    if (res.ok) {
      document.getElementById("nombre").value = "";
      document.getElementById("marca").value = "";
      document.getElementById("precio").value = "";
      document.getElementById("imagen").value = "";
      alert("✅ Moto agregada correctamente");
      cargarMotos();
    } else {
      alert("❌ Error al agregar la moto");
    }
  } catch (error) {
    console.error("Error:", error);
    alert("❌ Error al conectar con la API");
  }
}

async function eliminarMoto(id, nombre) {
  if (!confirm(`¿Está seguro de que desea eliminar ${nombre}?`)) {
    return;
  }

  try {
    const res = await fetch(API + "/motos/" + id, {
      method: "DELETE"
    });

    if (res.ok) {
      alert("✅ Moto eliminada correctamente");
      cargarMotos();
    } else {
      alert("❌ Error al eliminar la moto");
    }
  } catch (error) {
    console.error("Error:", error);
    alert("❌ Error al conectar con la API");
  }
}

// Cargar motos al iniciar
cargarMotos();

</script>

</body>
</html>
